services:
  web:
    build:
      context: /home/david/kube/docker/kube
      dockerfile: ./dockerfiles/nodejsnext/nodenext
    container_name: ctdavidnext
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    image: dsegura97/nexjs
    volumes:
      - ./logs:/root/logs
    networks:
      netnode:
        ipv4_address: 172.130.13.5
networks:
  netnode:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.130.13.0/24
